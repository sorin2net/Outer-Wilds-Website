<div class="data-pad" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h2 style="color: #48D1CC;">Verificare Identitate</h2>
    <p>Conectare la Baza de Date a Observatorului.</p>
    
    <input type="text" id="nume-utilizator" placeholder="Email (ex: ceva@altceva.da)" style="padding: 10px; width: 80%; margin-bottom: 15px;"><br>
    
    <input type="password" id="parola-utilizator" placeholder="Parolă" style="padding: 10px; width: 80%; margin-bottom: 20px;"><br>
    
    <button id="buton-verificare" style="padding: 10px 20px; cursor: pointer; background-color: #e67e22; border: none; font-weight: bold;">Verifică Accesul</button>
    
    <p id="mesaj-verificare" style="margin-top: 20px; font-weight: bold; font-size: 1.1rem;"></p>
</div>
